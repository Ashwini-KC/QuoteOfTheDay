{% extends "base.html" %}

{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-message">Sorry, the page you're looking for doesn't exist.</p>
        
        <div class="error-actions">
            <a href="/" class="btn btn-primary">🏠 Go to Home</a>
            <a href="/api/quote" class="btn btn-secondary">📡 Try API</a>
        </div>

        <div class="error-info">
            <p>If you think this is a mistake, please <a href="mailto:support@example.com">contact support</a>.</p>
        </div>
    </div>
</section>
{% endblock %}
