    <meta name="description" content="Quote of the Day - A daily inspirational quote">
    <title>{% block title %}Quote of the Day{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

        <div class="container">

                <a href="/" class="logo">✨ Quote of the Day</a>
